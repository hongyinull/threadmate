<!DOCTYPE html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="popup.css" />
    <title>Threadmate</title>
  </head>
  <body>
    <div class="head">
      <span class="logo">✨ Threadmate</span>
      <span class="ver">v0.1</span>
    </div>

    <div id="state" class="state">讀取中…</div>
    <div id="stats" class="state stats">📊 —</div>

    <label class="row">
      <input type="checkbox" id="enabled" />
      在 Threads / X 顯示按鈕
    </label>

    <button id="open" class="primary">開啟設定</button>

    <p class="foot">⌨️ Ctrl/⌘+Shift+Y 直接生成<br />自帶金鑰 · 零後端 · 只草擬不自動送出</p>
    <script src="popup.js"></script>
  </body>
</html>
